name: CI

on:
  push:
    branches:
      - main
  pull_request:

permissions:
  contents: read

jobs:
  validate:
    name: Validate
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2

      - name: Run tests
        run: bun test

      - name: Build package entrypoints
        run: bun run build

      - name: Generate sample SVG
        run: bun run build:card

      - name: Generate sample report
        run: bun run build:report
