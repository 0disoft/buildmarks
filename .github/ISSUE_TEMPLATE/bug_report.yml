name: Bug report
description: Report a reproducible Buildmarks problem without sharing secrets or private data.
title: "bug: "
labels:
  - bug
body:
  - type: markdown
    attributes:
      value: |
        Thanks for helping improve Buildmarks.

        Do not include secrets, private GitHub data, private repository names, tokens, or personal data in a public issue.
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: What went wrong?
    validations:
      required: true
  - type: textarea
    id: reproduce
    attributes:
      label: Reproduction
      description: List the smallest commands, fixture, or public repository example that reproduces the problem.
      placeholder: |
        1. Run `bun ...`
        2. Open `out/...`
        3. See ...
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      description: What should Buildmarks have done?
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
      description: What happened instead? Include sanitized command output when useful.
    validations:
      required: true
  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: OS, Bun version, command used, and whether this used local fixtures or public GitHub data.
      placeholder: |
        OS:
        Bun:
        Command:
        Data source:
    validations:
      required: false
  - type: checkboxes
    id: boundaries
    attributes:
      label: Public data boundary
      options:
        - label: I have removed secrets, tokens, private GitHub data, private repository names, and personal data.
          required: true
        - label: This report does not ask Buildmarks to infer developer worth, seniority, hiring suitability, or private work.
          required: true
