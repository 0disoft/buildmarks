<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" class="card card-auto" role="img" width="760" height="420" viewBox="0 0 760 420" aria-labelledby="title desc">
  <title id="title">Buildmarks GitHub signal card for example-builder</title>
  <desc id="desc">24 distinct signals found across 2 summarized repositories. Overall signal 61 out of 100 is available in the report. Maintainability 72 out of 100, Project Completeness 64 out of 100, Collaboration 45 out of 100, Shipping Evidence 58 out of 100, Consistency 85 out of 100, Public Adoption 41 out of 100. Public GitHub data only; not a developer ranking.</desc>
  <defs>
    <linearGradient id="panelStroke" x1="18" y1="18" x2="742" y2="402" gradientUnits="userSpaceOnUse">
      <stop offset="0%" class="stroke-start" />
      <stop offset="100%" class="stroke-end" />
    </linearGradient>
    <linearGradient id="barStrong" x1="324" y1="0" x2="578" y2="0" gradientUnits="userSpaceOnUse">
      <stop offset="0%" class="bar-strong-start" />
      <stop offset="100%" class="bar-strong-end" />
    </linearGradient>
    <linearGradient id="barMiddle" x1="324" y1="0" x2="578" y2="0" gradientUnits="userSpaceOnUse">
      <stop offset="0%" class="bar-middle-start" />
      <stop offset="100%" class="bar-middle-end" />
    </linearGradient>
    <linearGradient id="barLow" x1="324" y1="0" x2="578" y2="0" gradientUnits="userSpaceOnUse">
      <stop offset="0%" class="bar-low-start" />
      <stop offset="100%" class="bar-low-end" />
    </linearGradient>
    <filter id="cardShadow" x="-5%" y="-5%" width="110%" height="110%">
      <feDropShadow dx="0" dy="10" stdDeviation="12" flood-color="#000000" flood-opacity="0.18" />
    </filter>
  </defs>
  <style>
    .card {
      --bg: #f6f8fb;
      --panel: #ffffff;
      --panel-border: #cfdae5;
      --text: #102030;
      --muted: #587083;
      --accent: #0f8b6c;
      --accent-2: #21b28b;
      --warning: #7a5200;
      --chip-bg: #edf7f3;
      --chip-text: #245d4c;
      --track: #dce5ee;
      --low: #d55353;
      --low-2: #f08a62;
      --mid: #c28718;
      --mid-2: #e2b84f;
    }
    .card-dark {
      --bg: #081018;
      --panel: #101923;
      --panel-border: #26394a;
      --text: #eef5fb;
      --muted: #96a9ba;
      --accent: #4ee6a6;
      --accent-2: #8ff2c8;
      --warning: #f2c65f;
      --chip-bg: #172d27;
      --chip-text: #bfeeda;
      --track: #26394a;
      --low: #f87171;
      --low-2: #fb9b75;
      --mid: #f3c969;
      --mid-2: #f7df91;
    }
    @media (prefers-color-scheme: dark) {
      .card-auto {
        --bg: #081018;
        --panel: #101923;
        --panel-border: #26394a;
        --text: #eef5fb;
        --muted: #96a9ba;
        --accent: #4ee6a6;
        --accent-2: #8ff2c8;
        --warning: #f2c65f;
        --chip-bg: #172d27;
        --chip-text: #bfeeda;
        --track: #26394a;
        --low: #f87171;
        --low-2: #fb9b75;
        --mid: #f3c969;
        --mid-2: #f7df91;
      }
    }
    .bg { fill: var(--bg); }
    .panel { fill: var(--panel); stroke: url(#panelStroke); stroke-width: 1; }
    .top-line { stroke: url(#panelStroke); stroke-width: 2; stroke-linecap: round; opacity: 0.75; }
    .title { fill: var(--text); font: 700 24px ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
    .subtitle, .footer, .section-label, .metric-note, .legend { fill: var(--muted); font: 500 13px ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
    .name { fill: var(--text); font: 700 20px ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
    .type { fill: var(--accent); font: 700 14px ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
    .overall { fill: var(--warning); font: 800 44px ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
    .overall-strong { fill: var(--accent); }
    .overall-middle { fill: var(--warning); }
    .overall-low { fill: var(--low); }
    .overall-unit { fill: var(--muted); font: 700 16px ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
    .gap-count { fill: var(--muted); font: 700 16px ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
    .label { fill: var(--text); font: 600 14px ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
    .score { fill: var(--muted); font: 700 13px ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; text-anchor: end; }
    .track { fill: var(--track); }
    .bar-strong { fill: url(#barStrong); }
    .bar-middle { fill: url(#barMiddle); }
    .bar-low { fill: url(#barLow); }
    .chip-bg { fill: var(--chip-bg); stroke: var(--panel-border); stroke-width: 1; }
    .chip { fill: var(--chip-text); font: 600 12px ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
    .link-text { fill: var(--chip-text); font: 700 12px ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; text-anchor: end; text-decoration: underline; }
    .fallback-box { fill: var(--chip-bg); stroke: var(--panel-border); stroke-width: 1; }
    .fallback-title { fill: var(--text); font: 700 22px ui-sans-serif, system-ui, sans-serif; }
    .fallback-body { fill: var(--muted); font: 500 15px ui-sans-serif, system-ui, sans-serif; }
    .stroke-start { stop-color: var(--accent); stop-opacity: 0.72; }
    .stroke-end { stop-color: var(--warning); stop-opacity: 0.46; }
    .bar-strong-start { stop-color: var(--accent); }
    .bar-strong-end { stop-color: var(--accent-2); }
    .bar-middle-start { stop-color: var(--mid); }
    .bar-middle-end { stop-color: var(--mid-2); }
    .bar-low-start { stop-color: var(--low); }
    .bar-low-end { stop-color: var(--low-2); }
  </style>
  <rect width="760" height="420" class="bg" />
  <rect x="18" y="18" width="724" height="384" rx="14" class="panel" filter="url(#cardShadow)" />
  <path d="M24 22 H736" class="top-line" />
  <text x="36" y="56" class="title">Buildmarks</text>
  <text x="36" y="80" class="subtitle">Public GitHub signals</text>
  <text x="36" y="112" class="name">example-builder</text>
  <text x="36" y="136" class="type">Public GitHub signals · General Signal Profile</text>
  <text x="604" y="72" class="subtitle">Project Care</text>
  <text x="604" y="122" class="overall overall-middle">61</text>
  <text x="674" y="128" class="overall-unit">/100</text>
  <text x="604" y="144" class="metric-note">24 signals</text>
  <text x="604" y="160" class="metric-note">2 repos checked</text>
  <text x="604" y="178" class="metric-note">50-74 signal band</text>
  <text x="604" y="194" class="metric-note">last 1 year</text>

  <g aria-label="Dimension scores out of 100">

    <g role="img" aria-label="Maintainability: 72 points out of 100">
      <text x="36" y="156" class="label">Maintainability</text>
      <text x="268" y="156" class="score">72/100</text>
      <rect x="324" y="147" width="254" height="6" rx="3" class="track" aria-hidden="true" />
      <rect x="324" y="147" width="183" height="6" rx="3" class="bar bar-middle" role="progressbar" aria-label="Maintainability score" aria-valuemin="0" aria-valuemax="100" aria-valuenow="72" />
    </g>
    <g role="img" aria-label="Project Completeness: 64 points out of 100">
      <text x="36" y="185" class="label">Project Completeness</text>
      <text x="268" y="185" class="score">64/100</text>
      <rect x="324" y="176" width="254" height="6" rx="3" class="track" aria-hidden="true" />
      <rect x="324" y="176" width="163" height="6" rx="3" class="bar bar-middle" role="progressbar" aria-label="Project Completeness score" aria-valuemin="0" aria-valuemax="100" aria-valuenow="64" />
    </g>
    <g role="img" aria-label="Collaboration: 45 points out of 100">
      <text x="36" y="214" class="label">Collaboration</text>
      <text x="268" y="214" class="score">45/100</text>
      <rect x="324" y="205" width="254" height="6" rx="3" class="track" aria-hidden="true" />
      <rect x="324" y="205" width="114" height="6" rx="3" class="bar bar-low" role="progressbar" aria-label="Collaboration score" aria-valuemin="0" aria-valuemax="100" aria-valuenow="45" />
    </g>
    <g role="img" aria-label="Shipping Evidence: 58 points out of 100">
      <text x="36" y="243" class="label">Shipping Evidence</text>
      <text x="268" y="243" class="score">58/100</text>
      <rect x="324" y="234" width="254" height="6" rx="3" class="track" aria-hidden="true" />
      <rect x="324" y="234" width="147" height="6" rx="3" class="bar bar-middle" role="progressbar" aria-label="Shipping Evidence score" aria-valuemin="0" aria-valuemax="100" aria-valuenow="58" />
    </g>
    <g role="img" aria-label="Consistency: 85 points out of 100">
      <text x="36" y="272" class="label">Consistency</text>
      <text x="268" y="272" class="score">85/100</text>
      <rect x="324" y="263" width="254" height="6" rx="3" class="track" aria-hidden="true" />
      <rect x="324" y="263" width="216" height="6" rx="3" class="bar bar-strong" role="progressbar" aria-label="Consistency score" aria-valuemin="0" aria-valuemax="100" aria-valuenow="85" />
    </g>
    <g role="img" aria-label="Public Adoption: 41 points out of 100">
      <text x="36" y="301" class="label">Public Adoption</text>
      <text x="268" y="301" class="score">41/100</text>
      <rect x="324" y="292" width="254" height="6" rx="3" class="track" aria-hidden="true" />
      <rect x="324" y="292" width="104" height="6" rx="3" class="bar bar-low" role="progressbar" aria-label="Public Adoption score" aria-valuemin="0" aria-valuemax="100" aria-valuenow="41" />
    </g>
  </g>

  <g aria-label="Score color legend">
    <rect x="324" y="312" width="28" height="6" rx="3" class="bar bar-strong" />
    <text x="358" y="318" class="legend">75+</text>
    <rect x="396" y="312" width="28" height="6" rx="3" class="bar bar-middle" />
    <text x="430" y="318" class="legend">50-74</text>
    <rect x="478" y="312" width="28" height="6" rx="3" class="bar bar-low" />
    <text x="512" y="318" class="legend">0-49</text>
  </g>
  <text x="36" y="338" class="section-label">Found Signals</text>
  <g aria-label="Top public signals">

    <g role="img" aria-label="Signal found: Test signal found">
      <rect x="36" y="350" width="198" height="28" rx="6" class="chip-bg" />
      <text x="48" y="369" class="chip">Test signal found</text>
    </g>
    <g role="img" aria-label="Signal found: CI workflow found">
      <rect x="248" y="350" width="198" height="28" rx="6" class="chip-bg" />
      <text x="260" y="369" class="chip">CI workflow found</text>
    </g>
    <g role="img" aria-label="Signal found: Changelog or release notes …">
      <rect x="460" y="350" width="198" height="28" rx="6" class="chip-bg" />
      <text x="472" y="369" class="chip">Changelog or release notes …</text>
    </g>
  </g>
  <text x="36" y="397" class="footer">Buildmarks Profile · Public Signals · 2026-05-28</text>

</svg>