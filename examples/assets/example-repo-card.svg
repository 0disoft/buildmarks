      <text x="36" y="158" class="label">Maintainability</text>
      <text x="268" y="158" class="score">95/100</text>
      <rect x="324" y="147" width="238" height="10" rx="5" class="track" aria-hidden="true" />
      <rect x="324" y="147" width="226" height="10" rx="5" class="bar bar-strong" role="progressbar" aria-label="Maintainability score" aria-valuemin="0" aria-valuemax="100" aria-valuenow="95" />
    </g>
    <g role="img" aria-label="Project Completeness: 100 points out of 100">
      <text x="36" y="185" class="label">Project Completeness</text>
      <text x="268" y="185" class="score">100/100</text>
      <rect x="324" y="174" width="238" height="10" rx="5" class="track" aria-hidden="true" />
      <rect x="324" y="174" width="238" height="10" rx="5" class="bar bar-strong" role="progressbar" aria-label="Project Completeness score" aria-valuemin="0" aria-valuemax="100" aria-valuenow="100" />
    </g>
    <g role="img" aria-label="Collaboration: 90 points out of 100">
      <text x="36" y="212" class="label">Collaboration</text>
      <text x="268" y="212" class="score">90/100</text>
      <rect x="324" y="201" width="238" height="10" rx="5" class="track" aria-hidden="true" />
      <rect x="324" y="201" width="214" height="10" rx="5" class="bar bar-strong" role="progressbar" aria-label="Collaboration score" aria-valuemin="0" aria-valuemax="100" aria-valuenow="90" />
    </g>
    <g role="img" aria-label="Shipping Evidence: 100 points out of 100">
      <text x="36" y="239" class="label">Shipping Evidence</text>
      <text x="268" y="239" class="score">100/100</text>
      <rect x="324" y="228" width="238" height="10" rx="5" class="track" aria-hidden="true" />
      <rect x="324" y="228" width="238" height="10" rx="5" class="bar bar-strong" role="progressbar" aria-label="Shipping Evidence score" aria-valuemin="0" aria-valuemax="100" aria-valuenow="100" />
    </g>
    <g role="img" aria-label="Consistency: 100 points out of 100">
      <text x="36" y="266" class="label">Consistency</text>
      <text x="268" y="266" class="score">100/100</text>
      <rect x="324" y="255" width="238" height="10" rx="5" class="track" aria-hidden="true" />
      <rect x="324" y="255" width="238" height="10" rx="5" class="bar bar-strong" role="progressbar" aria-label="Consistency score" aria-valuemin="0" aria-valuemax="100" aria-valuenow="100" />
    </g>
    <g role="img" aria-label="External Validation: 69 points out of 100">
      <text x="36" y="293" class="label">External Validation</text>
      <text x="268" y="293" class="score">69/100</text>
      <rect x="324" y="282" width="238" height="10" rx="5" class="track" aria-hidden="true" />
      <rect x="324" y="282" width="164" height="10" rx="5" class="bar bar-middle" role="progressbar" aria-label="External Validation score" aria-valuemin="0" aria-valuemax="100" aria-valuenow="69" />
    </g>
  </g>
  <text x="36" y="338" class="section-label">Evidence</text>
  <g aria-label="Top public repository evidence traces">

    <g role="img" aria-label="Evidence: Test signal found">
      <rect x="36" y="350" width="208" height="28" rx="6" class="chip-bg" />
      <text x="48" y="369" class="chip">+ Test signal found</text>
    </g>
    <g role="img" aria-label="Evidence: CI workflow found">
      <rect x="260" y="350" width="208" height="28" rx="6" class="chip-bg" />
      <text x="272" y="369" class="chip">+ CI workflow found</text>
    </g>
    <g role="img" aria-label="Evidence: Changelog or release notes …">
      <rect x="484" y="350" width="208" height="28" rx="6" class="chip-bg" />
      <text x="496" y="369" class="chip">+ Changelog or release notes …</text>
    </g>
  </g>
  <text x="36" y="390" class="footer">Repository signal · Public data only · Not a ranking</text>
</svg>