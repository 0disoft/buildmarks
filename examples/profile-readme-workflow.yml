name: Update Buildmarks card

on:
  workflow_dispatch:
  schedule:
    - cron: "17 3 * * *"

permissions:
  contents: write

jobs:
  update-card:
    runs-on: ubuntu-latest
    steps:
      - name: Check out profile repository
        uses: actions/checkout@v4

      - name: Generate Buildmarks artifacts
        uses: 0disoft/buildmarks@v0
        with:
          username: ${{ github.repository_owner }}
          output: assets/buildmarks.svg
          generate-report: "true"
          report-output: assets/buildmarks-report
          token: ${{ github.token }}

      - name: Commit updated Buildmarks artifacts
        run: |
          if git diff --quiet -- assets/buildmarks.svg assets/buildmarks-report; then
            echo "Buildmarks artifacts are already up to date."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add assets/buildmarks.svg assets/buildmarks-report
          git commit -m "chore: update buildmarks artifacts"
          git push
