name: Buildmarks
description: Generate static Buildmarks profile README artifacts from public GitHub data.
branding:
  icon: activity
  color: green

inputs:
  username:
    description: GitHub username to analyze.
    required: true
  output:
    description: SVG output path, relative to the caller repository.
    required: false
    default: assets/buildmarks.svg
  generate-report:
    description: Whether to generate the inspectable HTML and JSON report next to the SVG.
    required: false
    default: "true"
  report-output:
    description: Static report output directory, relative to the caller repository.
    required: false
    default: assets/buildmarks-report
  token:
    description: Optional token. Public-only mode uses it for rate limits; private-local mode requires an explicit owner-provided read token.
    required: false
    default: ""
  private-local:
    description: Opt into owner-supplied private-local collection. Requires an explicit token and redacts private repository names.
    required: false
    default: "false"
  max-repositories-scanned:
    description: Maximum public repositories to scan.
    required: false
    default: "30"
  max-repositories-scored:
    description: Maximum public repositories to summarize in the card.
    required: false
    default: "12"
  activity-window-days:
    description: Only analyze repositories pushed within this many days.
    required: false
    default: "365"

runs:
  using: composite
  steps:
    - name: Validate Buildmarks inputs
      shell: bash
      env:
        BUILDMARKS_GENERATE_REPORT: ${{ inputs.generate-report }}
        BUILDMARKS_PRIVATE_LOCAL: ${{ inputs.private-local }}
        BUILDMARKS_MAX_REPOSITORIES_SCANNED: ${{ inputs.max-repositories-scanned }}
        BUILDMARKS_MAX_REPOSITORIES_SCORED: ${{ inputs.max-repositories-scored }}
        BUILDMARKS_ACTIVITY_WINDOW_DAYS: ${{ inputs.activity-window-days }}
      run: |
        set -euo pipefail

        case "$BUILDMARKS_GENERATE_REPORT" in
          true|false)
            ;;
          *)
            echo "::error title=Invalid generate-report::Expected generate-report to be exactly 'true' or 'false'."
            exit 1
            ;;
        esac

        case "$BUILDMARKS_PRIVATE_LOCAL" in
          true|false)
            ;;
          *)
            echo "::error title=Invalid private-local::Expected private-local to be exactly 'true' or 'false'."
            exit 1
            ;;
        esac

        if [[ ! "$BUILDMARKS_MAX_REPOSITORIES_SCANNED" =~ ^[1-9][0-9]*$ ]]; then
          echo "::error title=Invalid max-repositories-scanned::Expected a positive integer."
          exit 1
        fi
        if (( BUILDMARKS_MAX_REPOSITORIES_SCANNED > 100 )); then
          echo "::error title=Invalid max-repositories-scanned::Expected a value less than or equal to 100."
          exit 1
        fi

        if [[ ! "$BUILDMARKS_MAX_REPOSITORIES_SCORED" =~ ^[1-9][0-9]*$ ]]; then
          echo "::error title=Invalid max-repositories-scored::Expected a positive integer."
          exit 1
        fi
        if (( BUILDMARKS_MAX_REPOSITORIES_SCORED > 24 )); then
          echo "::error title=Invalid max-repositories-scored::Expected a value less than or equal to 24."
          exit 1
        fi
        if (( BUILDMARKS_MAX_REPOSITORIES_SCANNED < BUILDMARKS_MAX_REPOSITORIES_SCORED )); then
          echo "::error title=Invalid repository limits::Expected max-repositories-scanned to be greater than or equal to max-repositories-scored."
          exit 1
        fi

        if [[ ! "$BUILDMARKS_ACTIVITY_WINDOW_DAYS" =~ ^[1-9][0-9]*$ ]]; then
          echo "::error title=Invalid activity-window-days::Expected a positive integer."
          exit 1
        fi
        if (( BUILDMARKS_ACTIVITY_WINDOW_DAYS > 3650 )); then
          echo "::error title=Invalid activity-window-days::Expected a value less than or equal to 3650."
          exit 1
        fi

    - name: Set up Bun
      uses: oven-sh/setup-bun@v2

    - name: Generate Buildmarks artifacts
      if: ${{ inputs.generate-report == 'true' }}
      shell: bash
      env:
        BUILDMARKS_USERNAME: ${{ inputs.username }}
        BUILDMARKS_OUTPUT: ${{ inputs.output }}
        BUILDMARKS_REPORT_OUTPUT: ${{ inputs.report-output }}
        BUILDMARKS_TOKEN: ${{ inputs.token }}
        BUILDMARKS_PRIVATE_LOCAL: ${{ inputs.private-local }}
        BUILDMARKS_MAX_REPOSITORIES_SCANNED: ${{ inputs.max-repositories-scanned }}
        BUILDMARKS_MAX_REPOSITORIES_SCORED: ${{ inputs.max-repositories-scored }}
        BUILDMARKS_ACTIVITY_WINDOW_DAYS: ${{ inputs.activity-window-days }}
      run: |
        set -euo pipefail

        args=(
          "$BUILDMARKS_USERNAME"
          "$BUILDMARKS_OUTPUT"
          "$BUILDMARKS_REPORT_OUTPUT"
          "--max-repositories-scanned"
          "$BUILDMARKS_MAX_REPOSITORIES_SCANNED"
          "--max-repositories-scored"
          "$BUILDMARKS_MAX_REPOSITORIES_SCORED"
          "--activity-window-days"
          "$BUILDMARKS_ACTIVITY_WINDOW_DAYS"
        )

        if [ "$BUILDMARKS_PRIVATE_LOCAL" = "true" ]; then
          if [ -z "$BUILDMARKS_TOKEN" ]; then
            echo "::error title=Missing private-local token::private-local mode requires an explicit token input."
            exit 1
          fi
          args+=("--private-local")
        fi

        if [ -n "$BUILDMARKS_TOKEN" ]; then
          args+=("--token" "$BUILDMARKS_TOKEN")
        fi

        bun "$GITHUB_ACTION_PATH/src/cli/render-github-artifacts.ts" "${args[@]}"

    - name: Generate Buildmarks SVG
      if: ${{ inputs.generate-report != 'true' }}
      shell: bash
      env:
        BUILDMARKS_USERNAME: ${{ inputs.username }}
        BUILDMARKS_OUTPUT: ${{ inputs.output }}
        BUILDMARKS_TOKEN: ${{ inputs.token }}
        BUILDMARKS_PRIVATE_LOCAL: ${{ inputs.private-local }}
        BUILDMARKS_MAX_REPOSITORIES_SCANNED: ${{ inputs.max-repositories-scanned }}
        BUILDMARKS_MAX_REPOSITORIES_SCORED: ${{ inputs.max-repositories-scored }}
        BUILDMARKS_ACTIVITY_WINDOW_DAYS: ${{ inputs.activity-window-days }}
      run: |
        set -euo pipefail

        args=(
          "$BUILDMARKS_USERNAME"
          "$BUILDMARKS_OUTPUT"
          "--max-repositories-scanned"
          "$BUILDMARKS_MAX_REPOSITORIES_SCANNED"
          "--max-repositories-scored"
          "$BUILDMARKS_MAX_REPOSITORIES_SCORED"
          "--activity-window-days"
          "$BUILDMARKS_ACTIVITY_WINDOW_DAYS"
        )

        if [ "$BUILDMARKS_PRIVATE_LOCAL" = "true" ]; then
          if [ -z "$BUILDMARKS_TOKEN" ]; then
            echo "::error title=Missing private-local token::private-local mode requires an explicit token input."
            exit 1
          fi
          args+=("--private-local")
        fi

        if [ -n "$BUILDMARKS_TOKEN" ]; then
          args+=("--token" "$BUILDMARKS_TOKEN")
        fi

        bun "$GITHUB_ACTION_PATH/src/cli/render-github-card.ts" "${args[@]}"
